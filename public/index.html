<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSHAY RANJITH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

<div class="page" id="mainPage">
  <div class="name">AKSHAY RANJITH</div>
  <div class="slideshow-wrap">
    <div class="slideshow" id="slideshow"></div>
  </div>
  <div class="main-bottom">
    <button class="view-all-btn">View All</button>
    <div class="bottom-contact">
      <a href="https://www.instagram.com/akshay_ranjith?igsh=MWhwMXB0bDkxNDA2Zg==" target="_blank">Instagram</a>
      <a href="mailto:akshay1996ranjith@gmail.com">contact me</a>
    </div>
  </div>
</div>

<!-- GALLERY OVERLAY -->
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <button class="gallery-close">Close</button>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close">Close</button>
  <div class="lb-content" id="lbContent"></div>
</div>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-box" id="adminLogin">
    <h2>Admin</h2>
    <div class="admin-err" id="adminErr">Wrong credentials</div>
    <div class="admin-msg" id="adminMsg"></div>
    <!-- LOGIN VIEW -->
    <div class="form-view active" id="viewLogin">
      <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
        <input type="password" id="loginPass" placeholder="Password">
        <div class="admin-btns"><button type="submit" class="admin-primary">Login</button><button type="button" id="loginCancelBtn">Cancel</button></div>
      </form>
      <button class="admin-link" id="forgotLink">Forgot password?</button>
    </div>
    <!-- FORGOT VIEW -->
    <div class="form-view" id="viewForgot">
      <form id="forgotForm">
        <input type="text" id="forgotUser" placeholder="Username" autocomplete="off">
        <div class="admin-btns"><button type="submit" class="admin-primary">Send Reset Link</button><button type="button" id="forgotBackBtn">Back</button></div>
      </form>
    </div>
    <!-- RESET VIEW -->
    <div class="form-view" id="viewReset">
      <form id="resetForm">
        <input type="text" id="resetToken" placeholder="Reset token" autocomplete="off">
        <input type="password" id="resetNewPass" placeholder="New password">
        <input type="password" id="resetConfirm" placeholder="Confirm password">
        <div class="admin-btns"><button type="submit" class="admin-primary">Reset Password</button><button type="button" id="resetBackBtn">Back</button></div>
      </form>
    </div>
  </div>
  <div class="admin-panel" id="adminPanel">
    <div class="admin-panel-header"><h2>Manage Photos</h2><button id="logoutBtn">Logout</button></div>
    <div class="admin-add">
      <form class="add-row" id="addForm">
        <input type="text" id="addTitle" placeholder="Title" required>
        <label class="file-label" for="addFile"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span id="fileLabel">Choose image</span></label>
        <input type="file" id="addFile" accept="image/*" required>
        <input type="text" id="addDesc" placeholder="Description">
        <button type="submit" class="admin-primary">Upload</button>
      </form>
    </div>
    <div class="admin-list" id="adminList"></div>
  </div>
</div>

<button class="theme-toggle" title="Toggle theme">
  <svg viewBox="0 0 24 24" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<button class="admin-trigger" title="Admin">
  <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
</button>

<script src="/js/app.js"></script>
</body>
</html>
