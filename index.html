<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSHAY RANJITH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--font:'Outfit',sans-serif;--bg:#f2f0ed;--text:#1a1a1a;--dim:#888;--border:#ddd;--overlay:rgba(242,240,237,.97)}
[data-theme="dark"]{--bg:#141414;--text:#e8e6e3;--dim:#777;--border:#333;--overlay:rgba(20,20,20,.97)}
[data-theme="dark"] ::selection{background:#e8e6e3;color:#141414}
[data-theme="dark"] .gallery-grid .g-item:hover img{filter:brightness(1.1)}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;transition:background .35s ease,color .35s ease}
a{color:var(--text);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
a:hover{color:#555}
button{font-family:var(--font);cursor:pointer}
img{display:block;max-width:100%}
::selection{background:#1a1a1a;color:var(--bg)}

/* === MAIN LAYOUT === */
.page{display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-height:100vh;padding:3rem 2rem}

/* === NAME === */
.name{font-size:.82rem;font-weight:400;letter-spacing:.35em;text-transform:uppercase;text-align:center;padding-top:1rem}

/* === SLIDESHOW === */
.slideshow-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:340px;padding:1.5rem 0}
.slideshow{position:relative;width:100%;aspect-ratio:4/5;overflow:hidden}
.slideshow img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .45s ease}
.slideshow img.active{opacity:1}

/* === VIEW ALL BUTTON === */
.view-all-btn{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;background:none;border:none;color:var(--dim);padding:.5rem 0;margin-bottom:1.5rem;transition:color .3s;border-bottom:1px solid transparent}
.view-all-btn:hover{color:var(--text);border-bottom-color:var(--text)}

/* === BOTTOM CONTACT === */
.bottom-contact{text-align:center;display:flex;flex-direction:column;align-items:center;gap:.8rem;padding-bottom:1rem}
.bottom-contact a{font-size:.82rem;font-weight:400;letter-spacing:.06em;color:var(--text)}
.bottom-contact a:hover{color:#555}

/* === ADMIN LOCK === */
.admin-trigger{position:fixed;bottom:1.2rem;right:1.2rem;background:none;border:none;color:var(--dim);opacity:.3;transition:opacity .3s}
.admin-trigger:hover{opacity:.7}
.admin-trigger svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}

/* === GALLERY OVERLAY === */
.gallery-overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;opacity:0;pointer-events:none;overflow-y:auto;transition:opacity .4s ease}
.gallery-overlay.open{opacity:1;pointer-events:all}
.gallery-header{position:sticky;top:0;display:flex;justify-content:flex-end;padding:2rem 2rem 1rem;background:var(--overlay);z-index:2}
.gallery-close{font-family:var(--font);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;background:none;border:none;color:var(--dim);cursor:pointer;transition:color .3s}
.gallery-close:hover{color:var(--text)}
.gallery-grid{columns:2;column-gap:12px;padding:0 2rem 3rem}
.gallery-grid .g-item{break-inside:avoid;margin-bottom:12px;cursor:pointer;overflow:hidden;opacity:0;transform:translateY(20px)}
.gallery-grid .g-item img{width:100%;display:block;transition:transform .3s ease,filter .3s ease}
.gallery-grid .g-item:hover img{transform:scale(1.02);filter:brightness(.92)}

/* === LIGHTBOX === */
.lightbox{position:fixed;inset:0;background:var(--overlay);z-index:200;opacity:0;pointer-events:none;overflow-y:auto;display:flex;flex-direction:column;align-items:center;transition:opacity .35s ease}
.lightbox.open{opacity:1;pointer-events:all}
.lb-close{position:fixed;top:2rem;right:2rem;font-family:var(--font);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;background:none;border:none;color:var(--dim);cursor:pointer;z-index:3;transition:color .3s}
.lb-close:hover{color:var(--text)}
.lb-content{display:flex;flex-direction:column;align-items:center;padding:5rem 2rem 3rem;max-width:640px;width:100%}
.lb-content img{width:100%;display:block}
.lb-info{width:100%;display:flex;justify-content:space-between;align-items:center;padding-top:1.2rem;gap:1rem}
.lb-desc{font-size:.78rem;color:var(--dim);line-height:1.6;max-width:80%}
.lb-like-wrap{position:relative;flex-shrink:0}
.lb-like{background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;gap:6px;color:var(--dim);transition:color .25s ease}
.lb-like svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;transition:fill .25s ease,stroke .25s ease,transform .25s ease}
.lb-like:hover svg{transform:scale(1.1)}
.lb-like .like-count{font-size:.7rem;letter-spacing:.05em;font-family:var(--font);min-width:1ch}
.lb-like.liked{color:#e25555}
.lb-like.liked svg{fill:#e25555;stroke:#e25555}
/* particles */
.like-particle{position:absolute;width:5px;height:5px;border-radius:50%;pointer-events:none;top:50%;left:50%}

/* === ADMIN === */
.admin-overlay{position:fixed;inset:0;background:var(--overlay);z-index:300;opacity:0;pointer-events:none;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:4rem 2rem;transition:opacity .3s ease}
.admin-overlay.open{opacity:1;pointer-events:all}
.admin-box,.admin-panel{display:none;width:100%;max-width:420px}
.admin-box.show,.admin-panel.show{display:block}
.admin-box h2,.admin-panel-header h2{font-size:.82rem;font-weight:400;letter-spacing:.35em;text-transform:uppercase;margin-bottom:1.5rem}
.admin-err{font-size:.72rem;color:#c44;margin-bottom:1rem;display:none}
.admin-err.show{display:block}
.admin-box input{display:block;width:100%;font-family:var(--font);font-size:.8rem;padding:.6rem 0;border:none;border-bottom:1px solid var(--border);background:none;color:var(--text);margin-bottom:1rem;outline:none}
.admin-box input:focus{border-bottom-color:var(--text)}
.admin-btns{display:flex;gap:1rem;margin-top:.5rem}
.admin-btns button{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1rem;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;transition:background .2s,color .2s}
.admin-primary{background:var(--text)!important;color:var(--bg)!important;border-color:var(--text)!important}
.admin-primary:hover{opacity:.85}
.admin-panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.admin-panel-header button{font-family:var(--font);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;background:none;border:none;color:var(--dim);cursor:pointer}
.admin-panel-header button:hover{color:var(--text)}
.add-row{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.add-row input[type="text"],.add-row input[type="url"]{font-family:var(--font);font-size:.78rem;padding:.5rem 0;border:none;border-bottom:1px solid var(--border);background:none;color:var(--text);outline:none}
.add-row input[type="text"]:focus,.add-row input[type="url"]:focus{border-bottom-color:var(--text)}
.add-row .file-label{display:inline-flex;align-items:center;gap:.5rem;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);cursor:pointer;padding:.5rem 0;border-bottom:1px solid var(--border);transition:color .2s}
.add-row .file-label:hover{color:var(--text)}
.add-row .file-label svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.add-row .file-name{font-size:.7rem;color:var(--dim);font-style:italic}
.add-row input[type="file"]{display:none}
.add-row button{align-self:flex-start;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1.2rem;border:1px solid var(--text);background:var(--text);color:var(--bg);cursor:pointer;margin-top:.3rem}
.admin-list{display:flex;flex-direction:column;gap:1rem}
.admin-item{display:flex;align-items:center;gap:.8rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.admin-item img{width:48px;height:48px;object-fit:cover;flex-shrink:0}
.admin-item-info{flex:1;min-width:0}
.admin-item-info span{display:block;font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-item-info span:last-child{color:var(--dim);font-size:.68rem}
.admin-item-actions{display:flex;gap:.5rem;flex-shrink:0}
.admin-item-actions button{font-family:var(--font);font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;background:none;border:1px solid var(--border);padding:.3rem .6rem;cursor:pointer;color:var(--text);transition:border-color .2s}
.admin-item-actions button:hover{border-color:var(--text)}
.admin-item-actions .del-btn:hover{border-color:#c44;color:#c44}

/* === EMPTY STATE === */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;height:100%;text-align:center;padding:2rem}
.empty-state svg{width:36px;height:36px;stroke:var(--dim);fill:none;stroke-width:1;opacity:.5}
.empty-state p{font-size:.76rem;color:var(--dim);line-height:1.6;max-width:220px}
.empty-state .empty-hint{font-size:.66rem;opacity:.6}

/* === THEME TOGGLE === */
.theme-toggle{position:fixed;bottom:1.2rem;left:1.2rem;background:none;border:none;color:var(--dim);opacity:.35;transition:opacity .3s;cursor:pointer}
.theme-toggle:hover{opacity:.7}
.theme-toggle svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}

/* === ADMIN FORGOT/RESET === */
.admin-link{font-size:.68rem;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px;margin-top:.5rem;font-family:var(--font);transition:color .2s}
.admin-link:hover{color:var(--text)}
.admin-msg{font-size:.72rem;color:#2a7;margin-bottom:1rem;display:none}
.admin-msg.show{display:block}
.admin-box .form-view{display:none}
.admin-box .form-view.active{display:block}

/* === RESPONSIVE === */
@media(max-width:600px){
  .page{padding:2rem 1.2rem}
  .name{font-size:.72rem;letter-spacing:.3em}
  .slideshow-wrap{max-width:280px;padding:1rem 0}
  .gallery-grid{columns:2;column-gap:8px;padding:0 1rem 2rem}
  .gallery-grid .g-item{margin-bottom:8px}
  .gallery-header{padding:1.5rem 1rem .8rem}
  .lb-content{padding:4rem 1.2rem 2rem}
  .admin-overlay{padding:3rem 1.2rem}
}
@media(min-width:900px){
  .gallery-grid{columns:3;max-width:860px;margin:0 auto}
}
</style>
</head>
<body>

<div class="page" id="mainPage">
  <div class="name">AKSHAY RANJITH</div>
  <div class="slideshow-wrap">
    <div class="slideshow" id="slideshow"></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center">
    <button class="view-all-btn" onclick="openGallery()">View All</button>
    <div class="bottom-contact">
      <a href="https://instagram.com" target="_blank">Instagram</a>
      <a href="/cdn-cgi/l/email-protection#b2dad7dededdf2d3d9c1dad3cbc0d3dcd8dbc6da9cd1dddf"><span class="__cf_email__" data-cfemail="18707d7474775879736b7079616a797672716c70367b7775">[email&#160;protected]</span></a>
    </div>
  </div>
</div>

<!-- GALLERY OVERLAY -->
<div class="gallery-overlay" id="galleryOverlay">
  <div class="gallery-header">
    <button class="gallery-close" onclick="closeGallery()">Close</button>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">Close</button>
  <div class="lb-content" id="lbContent"></div>
</div>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-box" id="adminLogin">
    <h2>Admin</h2>
    <div class="admin-err" id="adminErr">Wrong credentials</div>
    <div class="admin-msg" id="adminMsg"></div>
    <!-- LOGIN VIEW -->
    <div class="form-view active" id="viewLogin">
      <form onsubmit="handleLogin(event)">
        <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
        <input type="password" id="loginPass" placeholder="Password">
        <div class="admin-btns"><button type="submit" class="admin-primary">Login</button><button type="button" onclick="closeAdmin()">Cancel</button></div>
      </form>
      <button class="admin-link" onclick="showView('viewForgot')">Forgot password?</button>
    </div>
    <!-- FORGOT VIEW -->
    <div class="form-view" id="viewForgot">
      <form onsubmit="handleForgot(event)">
        <input type="text" id="forgotUser" placeholder="Username" autocomplete="off">
        <div class="admin-btns"><button type="submit" class="admin-primary">Send Reset Link</button><button type="button" onclick="showView('viewLogin')">Back</button></div>
      </form>
    </div>
    <!-- RESET VIEW -->
    <div class="form-view" id="viewReset">
      <form onsubmit="handleReset(event)">
        <input type="text" id="resetToken" placeholder="Reset token" autocomplete="off">
        <input type="password" id="resetNewPass" placeholder="New password">
        <input type="password" id="resetConfirm" placeholder="Confirm password">
        <div class="admin-btns"><button type="submit" class="admin-primary">Reset Password</button><button type="button" onclick="showView('viewLogin')">Back</button></div>
      </form>
    </div>
  </div>
  <div class="admin-panel" id="adminPanel">
    <div class="admin-panel-header"><h2>Manage Photos</h2><button onclick="handleLogout()">Logout</button></div>
    <div class="admin-add">
      <form onsubmit="addPhoto(event)" class="add-row" id="addForm">
        <input type="text" id="addTitle" placeholder="Title" required>
        <label class="file-label" for="addFile"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span id="fileLabel">Choose image</span></label>
        <input type="file" id="addFile" accept="image/*" required>
        <input type="text" id="addDesc" placeholder="Description">
        <button type="submit" class="admin-primary">Upload</button>
      </form>
    </div>
    <div class="admin-list" id="adminList"></div>
  </div>
</div>

<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <svg viewBox="0 0 24 24" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<button class="admin-trigger" onclick="openAdmin()" title="Admin">
  <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
</button>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
/* === STATE === */
let photos=[];
let slideIdx=0;
let slideTimer=null;
const likedSet=new Set();
const likeCountMap=new Map();

/* === API === */
async function fetchPhotos(){
  try{
    const res=await fetch('/api/photos');
    if(res.ok){photos=await res.json();}
    else{photos=[];}
  }catch(err){
    console.error('Failed to fetch photos:',err);
    photos=[];
  }
  return photos;
}

/* === FILE INPUT LABEL === */
document.getElementById('addFile').addEventListener('change',function(){
  const label=document.getElementById('fileLabel');
  label.textContent=this.files[0]?this.files[0].name:'Choose image';
});

/* === SLIDESHOW === */
function renderSlideshow(){
  const el=document.getElementById("slideshow");
  const viewAllBtn=document.querySelector(".view-all-btn");
  el.innerHTML="";
  if(!photos.length){
    el.innerHTML='<div class="empty-state">'
      +'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
      +'<p>No photos yet</p>'
      +'<p class="empty-hint">Login as admin to upload your work</p></div>';
    if(viewAllBtn)viewAllBtn.style.display="none";
    return;
  }
  if(viewAllBtn)viewAllBtn.style.display="";
  photos.forEach((p,i)=>{
    const img=document.createElement("img");
    img.src=p.url;img.alt=p.title;
    if(i===0)img.classList.add("active");
    el.appendChild(img);
  });
  slideIdx=0;
  startSlideshow();
}
function startSlideshow(){
  clearInterval(slideTimer);
  if(photos.length<2)return;
  slideTimer=setInterval(()=>{
    const imgs=document.querySelectorAll("#slideshow img");
    if(!imgs.length)return;
    imgs[slideIdx].classList.remove("active");
    slideIdx=(slideIdx+1)%imgs.length;
    imgs[slideIdx].classList.add("active");
  },2200);
}

/* === GALLERY === */
function openGallery(){
  if(!photos.length)return;
  const ov=document.getElementById("galleryOverlay");
  const grid=document.getElementById("galleryGrid");
  grid.innerHTML="";
  photos.forEach((p)=>{
    const d=document.createElement("div");
    d.className="g-item";
    d.innerHTML='<img src="'+p.url+'" alt="'+p.title+'">';
    d.onclick=()=>openLightbox(p.id);
    grid.appendChild(d);
  });
  ov.classList.add("open");
  document.body.style.overflow="hidden";
  requestAnimationFrame(()=>{
    gsap.to(".g-item",{opacity:1,y:0,duration:.35,stagger:.04,ease:"power2.out"});
  });
}
function closeGallery(){
  const items=document.querySelectorAll('.g-item');
  gsap.to(items,{opacity:0,y:10,duration:.2,stagger:.015,ease:"power2.in",onComplete:()=>{
    document.getElementById("galleryOverlay").classList.remove("open");
    document.body.style.overflow="";
  }});
}

/* === LIGHTBOX === */
function openLightbox(id){
  const p=photos.find(x=>x.id===id);
  if(!p)return;
  const lb=document.getElementById("lightbox");
  const c=document.getElementById("lbContent");
  const liked=likedSet.has(id);
  const count=likeCountMap.get(id)||0;
  c.innerHTML='<img src="'+p.url+'" alt="'+p.title+'">'
    +'<div class="lb-info"><div class="lb-desc">'+(p.desc||p.title)+'</div>'
    +'<div class="lb-like-wrap"><button class="lb-like'+(liked?" liked":"")+'" data-id="'+id+'" onclick="toggleLike('+id+',this)">'
    +'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
    +'<span class="like-count">'+count+'</span></button></div></div>';
  lb.classList.add("open");
  // Animate image and info
  gsap.fromTo("#lbContent img",{opacity:0,scale:.97},{opacity:1,scale:1,duration:.4,ease:"power2.out"});
  gsap.fromTo(".lb-info",{opacity:0,y:12},{opacity:1,y:0,duration:.35,delay:.15,ease:"power2.out"});
}
function closeLightbox(){
  const lb=document.getElementById("lightbox");
  gsap.to("#lbContent",{opacity:0,y:10,duration:.2,ease:"power2.in",onComplete:()=>{
    lb.classList.remove("open");
    gsap.set("#lbContent",{opacity:1,y:0});
  }});
}
function toggleLike(id,btn){
  const countEl=btn.querySelector('.like-count');
  const wrap=btn.closest('.lb-like-wrap');
  if(likedSet.has(id)){
    likedSet.delete(id);
    likeCountMap.set(id,(likeCountMap.get(id)||1)-1);
    btn.classList.remove("liked");
    gsap.to(btn.querySelector('svg'),{scale:0.85,duration:.15,ease:"power2.in",onComplete:()=>{
      gsap.to(btn.querySelector('svg'),{scale:1,duration:.25,ease:"back.out(2)"});
    }});
  }else{
    likedSet.add(id);
    likeCountMap.set(id,(likeCountMap.get(id)||0)+1);
    btn.classList.add("liked");
    // Heart pop
    gsap.fromTo(btn.querySelector('svg'),{scale:1},{scale:1.3,duration:.15,ease:"power2.out",onComplete:()=>{
      gsap.to(btn.querySelector('svg'),{scale:1,duration:.4,ease:"elastic.out(1,.3)"});
    }});
    // Particle burst
    spawnParticles(wrap);
  }
  countEl.textContent=likeCountMap.get(id)||0;
}
function spawnParticles(container){
  const colors=['#e25555','#ff8a80','#ff5252','#f48fb1','#ef9a9a','#e57373'];
  for(let i=0;i<8;i++){
    const dot=document.createElement('div');
    dot.className='like-particle';
    dot.style.background=colors[i%colors.length];
    container.appendChild(dot);
    const angle=(i/8)*Math.PI*2;
    const dist=18+Math.random()*14;
    gsap.fromTo(dot,
      {x:0,y:0,scale:1,opacity:1},
      {x:Math.cos(angle)*dist,y:Math.sin(angle)*dist,scale:0,opacity:0,duration:.5+Math.random()*.2,ease:"power2.out",
       onComplete:()=>dot.remove()}
    );
  }
}

/* === ADMIN === */
let adminAuth=false;
function openAdmin(){
  const ov=document.getElementById("adminOverlay");
  ov.classList.add("open");
  document.body.style.overflow="hidden";
  if(adminAuth){showPanel();}else{showLogin();}
  gsap.fromTo(adminAuth?"#adminPanel":"#adminLogin",{opacity:0,y:15},{opacity:1,y:0,duration:.35,ease:"power2.out"});
}
function closeAdmin(){
  gsap.to("#adminOverlay > .show",{opacity:0,y:10,duration:.2,ease:"power2.in",onComplete:()=>{
    document.getElementById("adminOverlay").classList.remove("open");
    document.body.style.overflow="";
    gsap.set("#adminOverlay > *",{opacity:1,y:0});
  }});
  document.body.style.overflow="";
}
function showLogin(){
  document.getElementById("adminLogin").classList.add("show");
  document.getElementById("adminPanel").classList.remove("show");
  clearAdminMessages();
  showView('viewLogin');
}
function showPanel(){
  document.getElementById("adminLogin").classList.remove("show");
  document.getElementById("adminPanel").classList.add("show");
  renderAdminList();
}
function showView(id){
  document.querySelectorAll('.form-view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  clearAdminMessages();
}
function clearAdminMessages(){
  document.getElementById("adminErr").classList.remove("show");
  document.getElementById("adminErr").textContent="";
  document.getElementById("adminMsg").classList.remove("show");
  document.getElementById("adminMsg").textContent="";
}
function showErr(msg){const el=document.getElementById("adminErr");el.textContent=msg;el.classList.add("show");}
function showMsg(msg){const el=document.getElementById("adminMsg");el.textContent=msg;el.classList.add("show");}
async function handleLogin(e){
  e.preventDefault();
  clearAdminMessages();
  const u=document.getElementById("loginUser").value;
  const p=document.getElementById("loginPass").value;
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(res.ok){adminAuth=true;showPanel();}
    else{const d=await res.json();showErr(d.error||'Wrong credentials');}
  }catch(err){showErr('Server unavailable. Make sure the backend is running.');}
}
async function handleForgot(e){
  e.preventDefault();
  clearAdminMessages();
  const u=document.getElementById("forgotUser").value.trim();
  if(!u){showErr('Enter your username');return;}
  try{
    const res=await fetch('/api/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
    const d=await res.json();
    if(res.ok){showMsg(d.message||'Reset link sent to admin email');showView('viewReset');}
    else{showErr(d.error||'User not found');}
  }catch(err){showErr('Server unavailable. Make sure the backend is running.');}
}
async function handleReset(e){
  e.preventDefault();
  clearAdminMessages();
  const token=document.getElementById("resetToken").value.trim();
  const pw=document.getElementById("resetNewPass").value;
  const confirm=document.getElementById("resetConfirm").value;
  if(!token){showErr('Enter the reset token');return;}
  if(!pw||pw.length<6){showErr('Password must be at least 6 characters');return;}
  if(pw!==confirm){showErr('Passwords do not match');return;}
  try{
    const res=await fetch('/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw})});
    const d=await res.json();
    if(res.ok){showMsg('Password reset successful. You can now login.');showView('viewLogin');}
    else{showErr(d.error||'Invalid or expired token');}
  }catch(err){showErr('Server unavailable. Make sure the backend is running.');}
}
function handleLogout(){adminAuth=false;closeAdmin();}
function renderAdminList(){
  const el=document.getElementById("adminList");
  el.innerHTML="";
  photos.forEach(p=>{
    const d=document.createElement("div");
    d.className="admin-item";
    d.innerHTML='<img src="'+p.url+'" alt="">'
      +'<div class="admin-item-info"><span>'+p.title+'</span><span>'+(p.desc||"")+'</span></div>'
      +'<div class="admin-item-actions"><button onclick="editPhoto('+p.id+')">Edit</button><button class="del-btn" onclick="deletePhoto('+p.id+')">Del</button></div>';
    el.appendChild(d);
  });
}
async function addPhoto(e){
  e.preventDefault();
  const form=new FormData();
  const fileInput=document.getElementById("addFile");
  const title=document.getElementById("addTitle").value.trim();
  const desc=document.getElementById("addDesc").value.trim();
  if(!title||!fileInput.files[0])return;
  form.append('title',title);
  form.append('desc',desc);
  form.append('image',fileInput.files[0]);
  try{
    const res=await fetch('/api/photos',{method:'POST',body:form});
    if(res.ok){
      await fetchPhotos();
      document.getElementById("addForm").reset();
      document.getElementById("fileLabel").textContent="Choose image";
      renderAdminList();
      renderSlideshow();
    }
  }catch(err){console.error(err);alert('Upload failed. Check server connection.');}
}
async function deletePhoto(id){
  try{
    await fetch('/api/photos/'+id,{method:'DELETE'});
    await fetchPhotos();
    renderAdminList();
    renderSlideshow();
  }catch(err){console.error(err);alert('Delete failed. Check server connection.');}
}
async function editPhoto(id){
  const p=photos.find(x=>x.id===id);
  if(!p)return;
  const nt=prompt("Title:",p.title);
  if(nt===null)return;
  const nd=prompt("Description:",p.desc||"");
  if(nd===null)return;
  try{
    await fetch('/api/photos/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:nt||p.title,desc:nd})});
    await fetchPhotos();
    renderAdminList();
    renderSlideshow();
  }catch(err){console.error(err);}
}

/* === THEME === */
function toggleTheme(){
  const html=document.documentElement;
  const current=html.getAttribute('data-theme');
  const next=current==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('ar_theme',next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme){
  const icon=document.getElementById('themeIcon');
  if(theme==='dark'){
    icon.innerHTML='<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  }else{
    icon.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
}
// Restore saved theme
(function(){
  const saved=localStorage.getItem('ar_theme');
  if(saved){document.documentElement.setAttribute('data-theme',saved);updateThemeIcon(saved);}
})();

/* === INIT === */
(async()=>{
  await fetchPhotos();
  renderSlideshow();
  gsap.fromTo(".name",{opacity:0,y:-10},{opacity:1,y:0,duration:.4,delay:.1,ease:"power2.out"});
  gsap.fromTo(".slideshow-wrap",{opacity:0},{opacity:1,duration:.45,delay:.2,ease:"power2.out"});
  gsap.fromTo(".view-all-btn",{opacity:0},{opacity:1,duration:.35,delay:.3,ease:"power2.out"});
  gsap.fromTo(".bottom-contact",{opacity:0,y:8},{opacity:1,y:0,duration:.35,delay:.38,ease:"power2.out"});
})();

/* keyboard shortcuts */
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    if(document.getElementById("lightbox").classList.contains("open"))closeLightbox();
    else if(document.getElementById("galleryOverlay").classList.contains("open"))closeGallery();
    else if(document.getElementById("adminOverlay").classList.contains("open"))closeAdmin();
  }
});
</script>
